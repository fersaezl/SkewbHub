<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SkewbHub</title>

    <!-- Bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="stylesheet" href="css/timer.css" />
    <link rel="stylesheet" href="css/cases.css" />
</head>

<body>
    <!-- Navigation bar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">SkewbHub</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="selection.html">Selection</a>
                <a class="nav-link" href="statistics.html">Statistics</a>
            </div>
        </div>
    </nav>

    <!-- Main content -->
    <main class="container my-4">
        <div class="row">

            <!-- Case image -->
            <div class="col-12 col-md-4 text-center">
                <div id="case-image"></div>
                <p id="case-name" class="mt-2"></p>
            </div>

            <!-- Scramble -->
            <div class="col-12 col-md-8">
                <p id="scramble" class="text-center"></p>
            </div>

        </div>
    </main>

    <!-- Timer -->
    <section class="container text-center my-4">
        <div id="timer">0.00</div>
        <p id="timer-status">Press space to start</p>
    </section>


    <!-- jQuery & Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- App scripts -->
    <script src="js/cases.js"></script>
    <script src="js/timer.js"></script>
    <script src="js/main.js"></script>
</body>

</html>
