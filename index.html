<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SkewbHub</title>

    <!-- Bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="stylesheet" href="css/timer.css" />
    <link rel="stylesheet" href="css/cases.css" />
</head>

<body>
    <!-- Navigation bar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">SkewbHub</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="selection.html">Selection</a>
                <a class="nav-link" href="statistics.html">Statistics</a>
            </div>
        </div>
    </nav>

    <!-- Main content -->
    <main class="container my-4">
        <div class="row">

            <!-- Case image -->
            <div class="col-12 col-md-4 text-center">
                <div id="case-image"></div>
                <p id="case-name" class="mt-2"></p>
            </div>

            <!-- Scramble -->
            <div class="col-12 col-md-8">
                <p id="scramble" class="text-center"></p>
            </div>

        </div>
    </main>

    <!-- Timer -->
    <section class="container text-center my-4">
        <div id="timer">0.00</div>
        <p id="timer-status">Press space to start</p>
        <button id="btn-clear" class="btn btn-danger btn-sm mt-2">Clear</button>
        <div class="mt-3">
            <span>ao5: <span id="ao5">-</span></span>
            <span class="ms-3">ao12: <span id="ao12">-</span></span>
            <span class="ms-3">pb: <span id="pb">-</span></span>
        </div>
    </section>

    <section class="container my-4">
        <table class="table table-sm text-center" id="times-list">
            <thead>
                <tr>
                    <th>#</th>
                    <th>Time</th>
                    <th>ao5</th>
                    <th>ao12</th>
                </tr>
            </thead>
            <tbody id="times-body">
            </tbody>
        </table>
    </section>

    <footer class="text-center text-muted py-3">
        <small>SkewbHub v0.1.0</small>
    </footer>

    <!-- jQuery & Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- App scripts -->
    <script src="js/cases.js"></script>
    <script src="js/stats.js"></script>
    <script src="js/timer.js"></script>
    <script src="js/main.js"></script>
</body>

</html>
